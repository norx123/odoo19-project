x-odoo-service: &odoo-service
  build:
    context: .
    dockerfile: Dockerfile
  depends_on:
    - db
  environment:
    HOST: db
    USER: odoo
    PASSWORD: odoo
  volumes:
    - ./addons19:/mnt/extra-addons
    - odoo19-web-data:/var/lib/odoo

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo19-db-data:/var/lib/postgresql/data

  web:
    <<: *odoo-service
    ports:
      - "8080:8069"

  web_replica:
    <<: *odoo-service
    ports:
      - "8081:8069"

volumes:
  odoo19-db-data:
  odoo19-web-data:
